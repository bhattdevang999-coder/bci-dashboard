<!-- Atlas preview page shell — used for not-yet-built modules -->
<style>
#atlas-preview-page {
  background:#08111A; min-height:100vh; color:#E2E8F0;
  font-family:'Calibri', system-ui, sans-serif; padding:0;
}
.preview-shell { max-width:1080px; margin:0 auto; padding:48px 48px 80px; }
.preview-banner {
  display:flex; align-items:center; gap:14px; padding:14px 20px;
  background:linear-gradient(90deg, rgba(245,158,11,0.12), rgba(245,158,11,0.04));
  border:1px solid rgba(245,158,11,0.3); border-radius:10px; margin-bottom:32px;
  font-size:13px; color:#FBBF24;
}
.preview-banner .icon {
  width:32px; height:32px; border-radius:50%;
  background:rgba(245,158,11,0.18); display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.preview-banner b { color:#FBBF24; font-weight:700; }
.preview-banner span.detail { color:#94A3B8; }
.preview-banner .when {
  margin-left:auto; font-family:ui-monospace,Consolas,monospace; font-size:11px;
  background:rgba(245,158,11,0.18); color:#FBBF24; padding:5px 12px; border-radius:6px;
  letter-spacing:1px; font-weight:700;
}
.preview-eyebrow {
  font-family:ui-monospace,Consolas,monospace; font-size:11px;
  color:#5EEAD4; letter-spacing:2px; text-transform:uppercase; font-weight:700;
  margin-bottom:14px;
}
.preview-h1 {
  font-family:'Trebuchet MS', sans-serif; font-size:48px; font-weight:700;
  color:#E2E8F0; line-height:1.05; letter-spacing:-1px; margin:0 0 14px; max-width:780px;
}
.preview-sub {
  font-size:16px; color:#94A3B8; line-height:1.55; max-width:760px; margin:0 0 36px;
}
.preview-mockup {
  background:#0E1A26; border:1px dashed #1C2D40; border-radius:12px;
  padding:36px 32px; margin-bottom:24px; position:relative;
  overflow:hidden;
}
.preview-mockup::before {
  content:'MOCKUP'; position:absolute; top:14px; right:18px;
  font-family:ui-monospace,Consolas,monospace; font-size:9px;
  color:#475569; letter-spacing:1.5px; font-weight:700;
}
.preview-mockup h3 {
  font-family:'Trebuchet MS', sans-serif; font-size:18px; color:#E2E8F0;
  margin:0 0 14px; letter-spacing:-0.3px;
}
.preview-mockup p { font-size:13px; color:#94A3B8; line-height:1.6; margin:0; }
.preview-feature-grid {
  display:grid; grid-template-columns:repeat(2, 1fr); gap:14px; margin-bottom:24px;
}
.preview-feature {
  background:#0E1A26; border:1px solid #1C2D40; border-radius:10px; padding:18px 20px;
}
.preview-feature h4 {
  font-family:'Trebuchet MS', sans-serif; font-size:15px; color:#E2E8F0;
  margin:0 0 6px; letter-spacing:-0.2px;
}
.preview-feature p { font-size:12.5px; color:#94A3B8; line-height:1.55; margin:0; }
.preview-cta {
  margin-top:32px; padding:20px 24px;
  background:#0E1A26; border:1px solid #1C2D40; border-radius:10px;
  display:flex; justify-content:space-between; align-items:center; gap:24px;
}
.preview-cta-text {
  font-size:13px; color:#CBD5E1; line-height:1.55;
}
.preview-cta .atlas-mod-cta { padding:10px 20px; font-size:12px; }
.preview-related {
  margin-top:36px; padding-top:32px; border-top:1px solid #1C2D40;
}
.preview-related h4 {
  font-size:11px; color:#64748B; letter-spacing:2px; text-transform:uppercase;
  font-weight:700; margin:0 0 14px; font-family:'Trebuchet MS', sans-serif;
}
.preview-related-list {
  display:flex; gap:8px; flex-wrap:wrap;
}
.preview-related-list a {
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 14px; background:#0E1A26; border:1px solid #1C2D40;
  border-radius:6px; color:#94A3B8; text-decoration:none; font-size:12px;
  cursor:pointer; transition:all 150ms;
}
.preview-related-list a:hover { border-color:#5EEAD4; color:#5EEAD4; }
</style>

<div class="content content-wide" id="atlas-preview-page" style="display:none;">
  <div class="preview-shell" id="atlas-preview-content">
    <!-- populated by showPreviewPage() -->
  </div>
</div>
